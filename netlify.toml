[build]
  command = "if [ ! -d \"$HOME/flutter\" ]; then git clone --depth 1 https://github.com/flutter/flutter.git \"$HOME/flutter\"; fi && export PATH=\"$HOME/flutter/bin:$PATH\" && flutter --version && flutter config --enable-web && flutter pub get && flutter build web --release"
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
